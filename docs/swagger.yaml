basePath: /
definitions:
  hexagonalarchitecture_internal_core_domain.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  hexagonalarchitecture_internal_core_service.CreateUserInput:
    properties:
      email:
        type: string
      name:
        type: string
    required:
    - email
    - name
    type: object
  hexagonalarchitecture_internal_core_service.UpdateUserInput:
    properties:
      email:
        type: string
      name:
        type: string
    required:
    - email
    - name
    type: object
  internal_adapter_http_handler.ErrorResponse:
    properties:
      error:
        example: 'invalid input: email is invalid'
        type: string
    type: object
  internal_adapter_http_handler.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: A CRUD REST API built with Gin, PostgreSQL, Docker, and Hexagonal Architecture.
  title: Hexagonal Architecture CRUD API
  version: "1.0"
paths:
  /api/v1/users:
    get:
      description: Get all users.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/hexagonalarchitecture_internal_core_domain.User'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_adapter_http_handler.ErrorResponse'
      summary: List users
      tags:
      - Users
    post:
      consumes:
      - application/json
      description: Create a new user.
      parameters:
      - description: Create user payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/hexagonalarchitecture_internal_core_service.CreateUserInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/hexagonalarchitecture_internal_core_domain.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_adapter_http_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_adapter_http_handler.ErrorResponse'
      summary: Create user
      tags:
      - Users
  /api/v1/users/{id}:
    delete:
      description: Delete an existing user by ID.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_adapter_http_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_adapter_http_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_adapter_http_handler.ErrorResponse'
      summary: Delete user
      tags:
      - Users
    get:
      description: Get one user by ID.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hexagonalarchitecture_internal_core_domain.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_adapter_http_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_adapter_http_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_adapter_http_handler.ErrorResponse'
      summary: Get user by ID
      tags:
      - Users
    put:
      consumes:
      - application/json
      description: Update an existing user by ID.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Update user payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/hexagonalarchitecture_internal_core_service.UpdateUserInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/hexagonalarchitecture_internal_core_domain.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_adapter_http_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_adapter_http_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_adapter_http_handler.ErrorResponse'
      summary: Update user
      tags:
      - Users
  /health:
    get:
      description: Check API health status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_adapter_http_handler.HealthResponse'
      summary: Health check
      tags:
      - Health
swagger: "2.0"

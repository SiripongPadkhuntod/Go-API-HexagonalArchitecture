basePath: /
definitions:
  dto.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
    required:
    - email
    - name
    type: object
  dto.UpdateUserRequest:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
    required:
    - email
    - id
    - name
    type: object
  dto.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  http.ErrorResponse:
    properties:
      code:
        allOf:
        - $ref: '#/definitions/port.ErrorCode'
        example: "9988"
      message:
        allOf:
        - $ref: '#/definitions/port.ErrorMessage'
        example: Invalid request parameters.
    type: object
  http.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  http.SuccessResponse:
    properties:
      data: {}
      status:
        example: success
        type: string
    type: object
  port.ErrorCode:
    enum:
    - "9988"
    - "9987"
    - "9984"
    - "9983"
    - "5000"
    type: string
    x-enum-varnames:
    - ErrCodeBadRequest
    - ErrCodeInvalidInput
    - ErrCodeUserNotFound
    - ErrCodeUserAlreadyExists
    - ErrCodeInternalServer
  port.ErrorMessage:
    enum:
    - Invalid request parameters.
    - Invalid input
    - User not found
    - Email is already in use
    - Internal Server Error
    type: string
    x-enum-varnames:
    - ErrMessageInvalidRequestParams
    - ErrMessageInvalidInput
    - ErrMessageUserNotFound
    - ErrMessageUserAlreadyExists
    - ErrMessageInternalServer
host: localhost:8080
info:
  contact: {}
  description: A CRUD REST API built with Gin, PostgreSQL, Docker, and Hexagonal Architecture.
  title: Hexagonal Architecture CRUD API
  version: "1.0"
paths:
  /api/v1/files/upload:
    post:
      consumes:
      - multipart/form-data
      description: Upload an image to the object storage.
      parameters:
      - description: Image to upload
        in: formData
        name: image
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.SuccessResponse'
      summary: Upload an image
      tags:
      - Files
  /api/v1/users:
    get:
      description: Get all users.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.UserResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: List users
      tags:
      - Users
    post:
      consumes:
      - application/json
      description: Create a new user.
      parameters:
      - description: Create user payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Create user
      tags:
      - Users
  /api/v1/users/{id}:
    delete:
      description: Delete an existing user by ID.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Delete user
      tags:
      - Users
    get:
      description: Get one user by ID.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Get user by ID
      tags:
      - Users
    put:
      consumes:
      - application/json
      description: Update an existing user by ID.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Update user payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Update user
      tags:
      - Users
  /health:
    get:
      description: Check API health status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.HealthResponse'
      summary: Health check
      tags:
      - Health
swagger: "2.0"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hexagonal_architecture_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hexagonal_architecture
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hexagonal_architecture"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
